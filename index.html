<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <title>YouTube動画直接再生ランチャー</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #e9edf2;
      color: #1d2733;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      -webkit-text-size-adjust: 100%;
    }
    * { box-sizing: border-box; }

    .app {
      width: 100%;
      max-width: 820px;
      margin: 0 auto;
      padding-bottom: 26px;
    }

    .header {
      background: #26384a;
      color: #fff;
      text-align: center;
      padding: 15px 12px 12px;
      border-bottom: 1px solid #172330;
    }

    .header h1 {
      margin: 0;
      font-size: 21px;
      line-height: 1.3;
    }

    .version {
      margin-top: 4px;
      font-size: 12px;
      opacity: .8;
    }

    .panel {
      margin: 10px;
      padding: 11px;
      background: #fff;
      border: 1px solid #c8d0d8;
      border-radius: 10px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }

    .panel-title {
      margin: 0 0 9px;
      font-size: 17px;
    }

    .label {
      display: block;
      margin: 9px 0 6px;
      font-size: 15px;
      font-weight: 700;
    }

    .input {
      width: 100%;
      height: 46px;
      border: 1px solid #aeb8c2;
      border-radius: 7px;
      background: #fff;
      color: #111;
      padding: 8px 10px;
      font-size: 16px;
      -webkit-appearance: none;
    }

    .row {
      display: table;
      width: 100%;
      table-layout: fixed;
      border-spacing: 6px 0;
      margin-top: 9px;
    }

    .cell {
      display: table-cell;
      vertical-align: top;
    }

    .btn {
      width: 100%;
      min-height: 46px;
      border: 1px solid #1d5d96;
      border-radius: 8px;
      padding: 9px 5px;
      background: #2f7fc4;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      -webkit-appearance: none;
    }

    .btn:active { background: #1e639f; }

    .btn.red {
      background: #c94646;
      border-color: #982f2f;
    }

    .btn.green {
      background: #3a8a57;
      border-color: #2a6a40;
    }

    .btn.gray {
      background: #687785;
      border-color: #4f5b66;
    }

    .btn.orange {
      background: #d4822f;
      border-color: #a7621e;
    }

    .btn.big {
      min-height: 58px;
      font-size: 20px;
    }

    .status {
      margin-top: 10px;
      min-height: 42px;
      padding: 9px 10px;
      background: #f4f7fa;
      border: 1px solid #d2dae2;
      border-radius: 7px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-all;
    }

    .list {
      margin-top: 8px;
    }

    .item {
      position: relative;
      margin-bottom: 8px;
      padding: 9px;
      background: #f8fafc;
      border: 1px solid #cfd7df;
      border-radius: 8px;
    }

    .item-title {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.35;
      padding-right: 42px;
      word-break: break-all;
    }

    .item-url {
      margin-top: 4px;
      color: #56626e;
      font-size: 12px;
      line-height: 1.35;
      word-break: break-all;
    }

    .item-actions {
      display: table;
      width: 100%;
      table-layout: fixed;
      border-spacing: 5px 0;
      margin-top: 8px;
    }

    .item-actions .cell .btn {
      min-height: 40px;
      font-size: 14px;
      padding: 6px 4px;
    }

    .star {
      position: absolute;
      right: 9px;
      top: 8px;
      font-size: 25px;
      line-height: 1;
    }

    .empty {
      padding: 13px 8px;
      text-align: center;
      color: #6a7681;
      font-size: 14px;
    }

    .note {
      margin: 0;
      font-size: 13px;
      line-height: 1.6;
    }

    .tabs {
      display: table;
      width: 100%;
      table-layout: fixed;
      border-spacing: 5px 0;
      margin-top: 8px;
    }

    .tab {
      display: table-cell;
      text-align: center;
      padding: 9px 3px;
      border: 1px solid #9eabb7;
      border-radius: 7px;
      background: #dde4ea;
      color: #26384a;
      font-weight: 700;
      font-size: 14px;
    }

    .tab.active {
      background: #2f7fc4;
      color: #fff;
      border-color: #1d5d96;
    }

    @media (max-width: 480px) {
      .header h1 { font-size: 18px; }
      .panel { margin: 8px; padding: 10px; }
      .btn { font-size: 15px; min-height: 44px; }
      .btn.big { font-size: 19px; min-height: 56px; }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>YouTube動画直接再生ランチャー</h1>
    <div class="version">iOS 9用 Ver.260710-0002</div>
  </div>

  <div class="panel">
    <h2 class="panel-title">動画を再生</h2>

    <label class="label" for="titleText">動画名</label>
    <input id="titleText" class="input" type="text" placeholder="例：お気に入りの音楽">

    <label class="label" for="urlText">YouTube動画URL または 動画ID</label>
    <input id="urlText" class="input" type="text" placeholder="https://youtu.be/... または 11文字ID">

    <div class="row">
      <div class="cell"><button class="btn red big" type="button" onclick="playCurrent()">▶ 直接再生</button></div>
    </div>

    <div class="row">
      <div class="cell"><button class="btn green" type="button" onclick="saveFavorite()">★ お気に入り登録</button></div>
      <div class="cell"><button class="btn gray" type="button" onclick="clearInputs()">入力クリア</button></div>
    </div>

    <div id="status" class="status">動画URLまたは動画IDを入力してください。</div>
  </div>

  <div class="panel">
    <div class="tabs">
      <div id="tabFav" class="tab active" onclick="showMode('favorite')">お気に入り</div>
      <div id="tabHist" class="tab" onclick="showMode('history')">再生履歴</div>
    </div>

    <div id="favoriteArea" class="list"></div>
    <div id="historyArea" class="list" style="display:none;"></div>

    <div class="row">
      <div class="cell"><button class="btn orange" type="button" onclick="exportData()">バックアップ表示</button></div>
      <div class="cell"><button class="btn gray" type="button" onclick="clearCurrentList()">表示中を全削除</button></div>
    </div>
  </div>

  <div class="panel">
    <h2 class="panel-title">使い方</h2>
    <p class="note">
      1. YouTube動画URLまたは11文字の動画IDを入力します。<br>
      2. 「直接再生」でYouTube動画ページを開きます。<br>
      3. 再生した動画は履歴へ保存されます。<br>
      4. よく見る動画はお気に入りへ登録できます。<br>
      5. YouTubeから戻るときはSafariの「戻る」を使用します。
    </p>
  </div>
</div>

<script type="text/javascript">
var STORAGE_FAVORITES = "ios9_yt_launcher_favorites_v1";
var STORAGE_HISTORY = "ios9_yt_launcher_history_v1";
var STORAGE_LAST_TITLE = "ios9_yt_launcher_last_title";
var STORAGE_LAST_URL = "ios9_yt_launcher_last_url";
var currentMode = "favorite";

function trimText(s) {
  return (s || "").replace(/^\s+|\s+$/g, "");
}

function escapeHtml(s) {
  return String(s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function extractVideoId(value) {
  var text = trimText(value);
  var match;

  if (/^[A-Za-z0-9_-]{11}$/.test(text)) return text;

  match = text.match(/[?&]v=([A-Za-z0-9_-]{11})/);
  if (match && match[1]) return match[1];

  match = text.match(/youtu\.be\/([A-Za-z0-9_-]{11})/);
  if (match && match[1]) return match[1];

  match = text.match(/youtube\.com\/embed\/([A-Za-z0-9_-]{11})/);
  if (match && match[1]) return match[1];

  match = text.match(/youtube\.com\/shorts\/([A-Za-z0-9_-]{11})/);
  if (match && match[1]) return match[1];

  return "";
}

function setStatus(message) {
  document.getElementById("status").innerHTML = message;
}

function loadArray(key) {
  var text;
  try {
    text = localStorage.getItem(key);
    if (!text) return [];
    return JSON.parse(text);
  } catch (e) {
    return [];
  }
}

function saveArray(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
    return true;
  } catch (e) {
    setStatus("保存できませんでした。Safariのプライベートブラウズでは保存できない場合があります。");
    return false;
  }
}

function saveLastInputs() {
  try {
    localStorage.setItem(STORAGE_LAST_TITLE, document.getElementById("titleText").value);
    localStorage.setItem(STORAGE_LAST_URL, document.getElementById("urlText").value);
  } catch (e) {}
}

function loadLastInputs() {
  try {
    document.getElementById("titleText").value = localStorage.getItem(STORAGE_LAST_TITLE) || "";
    document.getElementById("urlText").value = localStorage.getItem(STORAGE_LAST_URL) || "";
  } catch (e) {}
}

function makeWatchUrl(id) {
  return "https://m.youtube.com/watch?v=" + id;
}

function buildEntry() {
  var title = trimText(document.getElementById("titleText").value);
  var raw = trimText(document.getElementById("urlText").value);
  var id = extractVideoId(raw);

  if (!id) {
    setStatus("動画IDを判定できません。YouTube動画URLまたは11文字の動画IDを入力してください。");
    return null;
  }

  if (!title) title = "YouTube動画 " + id;

  return {
    title: title,
    id: id,
    url: makeWatchUrl(id),
    time: new Date().getTime()
  };
}

function addHistory(entry) {
  var list = loadArray(STORAGE_HISTORY);
  var newList = [];
  var i;

  newList.push(entry);
  for (i = 0; i < list.length; i++) {
    if (list[i].id !== entry.id) newList.push(list[i]);
    if (newList.length >= 30) break;
  }

  saveArray(STORAGE_HISTORY, newList);
  renderHistory();
}

function playCurrent() {
  var entry = buildEntry();
  if (!entry) return;

  saveLastInputs();
  addHistory(entry);
  setStatus("YouTube動画ページを開きます。<br>" + escapeHtml(entry.title));
  window.location.href = entry.url;
}

function saveFavorite() {
  var entry = buildEntry();
  var list, i, found;

  if (!entry) return;

  list = loadArray(STORAGE_FAVORITES);
  found = false;

  for (i = 0; i < list.length; i++) {
    if (list[i].id === entry.id) {
      list[i] = entry;
      found = true;
      break;
    }
  }

  if (!found) list.unshift(entry);

  saveLastInputs();
  if (saveArray(STORAGE_FAVORITES, list)) {
    setStatus(found ? "お気に入りを更新しました。" : "お気に入りへ登録しました。");
    renderFavorites();
  }
}

function clearInputs() {
  document.getElementById("titleText").value = "";
  document.getElementById("urlText").value = "";
  saveLastInputs();
  setStatus("入力欄をクリアしました。");
}

function playSaved(type, index) {
  var key = type === "favorite" ? STORAGE_FAVORITES : STORAGE_HISTORY;
  var list = loadArray(key);
  var item = list[index];

  if (!item) return;

  document.getElementById("titleText").value = item.title || "";
  document.getElementById("urlText").value = item.url || item.id || "";
  saveLastInputs();

  item.time = new Date().getTime();
  addHistory(item);

  setStatus("YouTube動画ページを開きます。<br>" + escapeHtml(item.title));
  window.location.href = makeWatchUrl(item.id);
}

function editSaved(type, index) {
  var key = type === "favorite" ? STORAGE_FAVORITES : STORAGE_HISTORY;
  var list = loadArray(key);
  var item = list[index];

  if (!item) return;

  document.getElementById("titleText").value = item.title || "";
  document.getElementById("urlText").value = item.url || item.id || "";
  saveLastInputs();
  setStatus("入力欄へ読み込みました。内容を変更して登録できます。");
  window.scrollTo(0, 0);
}

function deleteSaved(type, index) {
  var key = type === "favorite" ? STORAGE_FAVORITES : STORAGE_HISTORY;
  var list = loadArray(key);

  if (!list[index]) return;
  if (!confirm("この項目を削除しますか？")) return;

  list.splice(index, 1);
  saveArray(key, list);

  if (type === "favorite") renderFavorites();
  else renderHistory();

  setStatus("削除しました。");
}

function itemHtml(item, index, type) {
  var title = escapeHtml(item.title || ("YouTube動画 " + item.id));
  var url = escapeHtml(item.url || makeWatchUrl(item.id));

  return ''
    + '<div class="item">'
    +   '<div class="star">' + (type === "favorite" ? "★" : "▶") + '</div>'
    +   '<div class="item-title">' + title + '</div>'
    +   '<div class="item-url">' + url + '</div>'
    +   '<div class="item-actions">'
    +     '<div class="cell"><button class="btn red" type="button" onclick="playSaved(\'' + type + '\',' + index + ')">再生</button></div>'
    +     '<div class="cell"><button class="btn green" type="button" onclick="editSaved(\'' + type + '\',' + index + ')">入力へ</button></div>'
    +     '<div class="cell"><button class="btn gray" type="button" onclick="deleteSaved(\'' + type + '\',' + index + ')">削除</button></div>'
    +   '</div>'
    + '</div>';
}

function renderFavorites() {
  var area = document.getElementById("favoriteArea");
  var list = loadArray(STORAGE_FAVORITES);
  var html = "";
  var i;

  if (!list.length) {
    area.innerHTML = '<div class="empty">お気に入りはまだありません。</div>';
    return;
  }

  for (i = 0; i < list.length; i++) {
    html += itemHtml(list[i], i, "favorite");
  }
  area.innerHTML = html;
}

function renderHistory() {
  var area = document.getElementById("historyArea");
  var list = loadArray(STORAGE_HISTORY);
  var html = "";
  var i;

  if (!list.length) {
    area.innerHTML = '<div class="empty">再生履歴はまだありません。</div>';
    return;
  }

  for (i = 0; i < list.length; i++) {
    html += itemHtml(list[i], i, "history");
  }
  area.innerHTML = html;
}

function showMode(mode) {
  currentMode = mode;

  if (mode === "favorite") {
    document.getElementById("favoriteArea").style.display = "block";
    document.getElementById("historyArea").style.display = "none";
    document.getElementById("tabFav").className = "tab active";
    document.getElementById("tabHist").className = "tab";
  } else {
    document.getElementById("favoriteArea").style.display = "none";
    document.getElementById("historyArea").style.display = "block";
    document.getElementById("tabFav").className = "tab";
    document.getElementById("tabHist").className = "tab active";
  }
}

function clearCurrentList() {
  var key = currentMode === "favorite" ? STORAGE_FAVORITES : STORAGE_HISTORY;
  var name = currentMode === "favorite" ? "お気に入り" : "再生履歴";

  if (!confirm(name + "をすべて削除しますか？")) return;

  saveArray(key, []);
  if (currentMode === "favorite") renderFavorites();
  else renderHistory();

  setStatus(name + "をすべて削除しました。");
}

function exportData() {
  var data = {
    version: "260710-0002",
    favorites: loadArray(STORAGE_FAVORITES),
    history: loadArray(STORAGE_HISTORY)
  };

  var text = JSON.stringify(data, null, 2);
  var w = window.open("", "_blank");

  if (!w) {
    setStatus("バックアップ画面を開けませんでした。ポップアップを許可してください。");
    return;
  }

  w.document.open();
  w.document.write(
    '<!DOCTYPE html><html><head><meta charset="UTF-8">'
    + '<meta name="viewport" content="width=device-width,initial-scale=1">'
    + '<title>バックアップ</title>'
    + '<style>body{font-family:monospace;padding:12px;white-space:pre-wrap;word-break:break-all;background:#fff;color:#111}</style>'
    + '</head><body>'
    + escapeHtml(text)
    + '</body></html>'
  );
  w.document.close();

  setStatus("バックアップ内容を別画面へ表示しました。");
}

loadLastInputs();
renderFavorites();
renderHistory();
</script>
</body>
</html>
