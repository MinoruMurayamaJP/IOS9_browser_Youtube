<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <title>iOS 9 YouTube Browser</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #e9edf2;
      color: #1d2733;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      min-height: 100%;
      -webkit-text-size-adjust: 100%;
    }
    * { box-sizing: border-box; }
    .app {
      width: 100%;
      max-width: 820px;
      margin: 0 auto;
      padding-bottom: 28px;
    }
    .header {
      background: #26384a;
      color: #fff;
      padding: 16px 14px 13px;
      text-align: center;
      border-bottom: 1px solid #172330;
    }
    .header h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.25;
      font-weight: 700;
    }
    .version {
      margin-top: 5px;
      font-size: 12px;
      opacity: .78;
    }
    .panel {
      background: #fff;
      margin: 12px;
      padding: 12px;
      border: 1px solid #c8d0d8;
      border-radius: 10px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }
    .label {
      display: block;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 7px;
    }
    .input {
      width: 100%;
      height: 46px;
      border: 1px solid #aeb8c2;
      border-radius: 7px;
      padding: 8px 10px;
      font-size: 17px;
      background: #fff;
      color: #111;
      -webkit-appearance: none;
    }
    .row {
      display: table;
      width: 100%;
      table-layout: fixed;
      margin-top: 9px;
      border-spacing: 6px 0;
    }
    .cell {
      display: table-cell;
      vertical-align: top;
    }
    .btn {
      width: 100%;
      min-height: 46px;
      border: 1px solid #1c5f9e;
      border-radius: 8px;
      background: #2f7fc4;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      padding: 9px 6px;
      -webkit-appearance: none;
      cursor: pointer;
    }
    .btn:active { background: #1f639f; }
    .btn.red {
      background: #c94646;
      border-color: #9c2e2e;
    }
    .btn.gray {
      background: #687785;
      border-color: #4f5c67;
    }
    .btn.green {
      background: #3a8a57;
      border-color: #2b6941;
    }
    .status {
      margin-top: 10px;
      min-height: 40px;
      padding: 9px 10px;
      background: #f4f7fa;
      border: 1px solid #d2dae2;
      border-radius: 7px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-all;
    }
    .player-wrap {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
    }
    .player-wrap iframe {
      position: absolute;
      left: 0; top: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #000;
    }
    .note {
      font-size: 14px;
      line-height: 1.6;
      margin: 0;
    }
    .small {
      font-size: 12px;
      color: #5b6772;
      margin-top: 8px;
      line-height: 1.5;
    }
    .section-title {
      margin: 0 0 9px;
      font-size: 17px;
    }
    @media (max-width: 480px) {
      .header h1 { font-size: 19px; }
      .panel { margin: 9px; padding: 10px; }
      .btn { font-size: 15px; min-height: 44px; }
      .input { font-size: 16px; }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>iOS 9 YouTube Browser</h1>
    <div class="version">試験版 Ver.260710-0001</div>
  </div>

  <div class="panel">
    <label class="label" for="searchText">YouTube検索</label>
    <input id="searchText" class="input" type="text" placeholder="検索文字を入力">
    <div class="row">
      <div class="cell"><button class="btn red" type="button" onclick="searchYouTube()">検索を開く</button></div>
      <div class="cell"><button class="btn gray" type="button" onclick="openMobileYouTube()">YouTubeトップ</button></div>
    </div>
  </div>

  <div class="panel">
    <label class="label" for="videoText">動画URL または 動画ID</label>
    <input id="videoText" class="input" type="text" placeholder="https://youtu.be/... または 11文字のID">
    <div class="row">
      <div class="cell"><button class="btn green" type="button" onclick="loadVideo()">埋め込み再生</button></div>
      <div class="cell"><button class="btn red" type="button" onclick="openVideoDirect()">直接開く</button></div>
    </div>
    <div class="row">
      <div class="cell"><button class="btn gray" type="button" onclick="clearVideo()">停止・クリア</button></div>
      <div class="cell"><button class="btn gray" type="button" onclick="pasteExample()">入力例</button></div>
    </div>
    <div id="status" class="status">動画URLまたは動画IDを入力してください。</div>
  </div>

  <div class="panel">
    <h2 class="section-title">プレーヤー</h2>
    <div class="player-wrap">
      <iframe id="player"
        src="about:blank"
        allowfullscreen
        webkitallowfullscreen
        mozallowfullscreen>
      </iframe>
    </div>
    <div class="small">
      再生できない場合は「直接開く」をお試しください。iOS 9と現在のYouTubeの組み合わせでは、動画によって再生できない場合があります。
    </div>
  </div>

  <div class="panel">
    <h2 class="section-title">試験項目</h2>
    <p class="note">
      ① YouTube検索結果が開くか<br>
      ② 動画ページを直接開けるか<br>
      ③ 埋め込みプレーヤーが表示されるか<br>
      ④ 再生ボタンで動画が開始するか<br>
      ⑤ 全画面表示に切り替えられるか
    </p>
  </div>
</div>

<script type="text/javascript">
(function () {
  var saved = "";
  try {
    saved = localStorage.getItem("ios9_youtube_last") || "";
  } catch (e) {}
  if (saved) {
    document.getElementById("videoText").value = saved;
  }
})();

function trimText(s) {
  return (s || "").replace(/^\s+|\s+$/g, "");
}

function encodeQuery(s) {
  return encodeURIComponent(s).replace(/%20/g, "+");
}

function extractVideoId(value) {
  var text = trimText(value);
  var match;

  if (/^[A-Za-z0-9_-]{11}$/.test(text)) {
    return text;
  }

  match = text.match(/[?&]v=([A-Za-z0-9_-]{11})/);
  if (match && match[1]) return match[1];

  match = text.match(/youtu\.be\/([A-Za-z0-9_-]{11})/);
  if (match && match[1]) return match[1];

  match = text.match(/youtube\.com\/embed\/([A-Za-z0-9_-]{11})/);
  if (match && match[1]) return match[1];

  match = text.match(/youtube\.com\/shorts\/([A-Za-z0-9_-]{11})/);
  if (match && match[1]) return match[1];

  return "";
}

function setStatus(message) {
  document.getElementById("status").innerHTML = message;
}

function saveLast(value) {
  try {
    localStorage.setItem("ios9_youtube_last", value);
  } catch (e) {}
}

function searchYouTube() {
  var q = trimText(document.getElementById("searchText").value);
  if (!q) {
    setStatus("検索文字を入力してください。");
    return;
  }
  var url = "https://m.youtube.com/results?search_query=" + encodeQuery(q);
  setStatus("YouTube検索を開きます：<br>" + q);
  window.location.href = url;
}

function openMobileYouTube() {
  setStatus("YouTubeモバイル版トップを開きます。");
  window.location.href = "https://m.youtube.com/";
}

function loadVideo() {
  var raw = document.getElementById("videoText").value;
  var id = extractVideoId(raw);

  if (!id) {
    setStatus("動画IDを判定できません。YouTubeのURLまたは11文字の動画IDを入力してください。");
    return;
  }

  saveLast(raw);
  var src = "https://www.youtube-nocookie.com/embed/" + id +
            "?playsinline=1&rel=0&modestbranding=1&html5=1";
  document.getElementById("player").src = src;
  setStatus("埋め込みプレーヤーへ読み込みました。<br>動画ID：" + id);
}

function openVideoDirect() {
  var raw = document.getElementById("videoText").value;
  var id = extractVideoId(raw);

  if (!id) {
    setStatus("動画IDを判定できません。YouTubeのURLまたは11文字の動画IDを入力してください。");
    return;
  }

  saveLast(raw);
  setStatus("YouTube動画ページを直接開きます。<br>動画ID：" + id);
  window.location.href = "https://m.youtube.com/watch?v=" + id;
}

function clearVideo() {
  document.getElementById("player").src = "about:blank";
  setStatus("プレーヤーを停止してクリアしました。");
}

function pasteExample() {
  document.getElementById("videoText").value = "dQw4w9WgXcQ";
  setStatus("入力例をセットしました。実際の動画URLまたは動画IDへ置き換えてください。");
}
</script>
</body>
</html>
